rms to punch you with.",SKETCH_VITRUVIAN_MAN_NAME:"Vitruvian Man",SKETCH_WANDERING_RONIN_FLAVOR_0:"The shadows do his talking.",SKETCH_WANDERING_RONIN_FLAVOR_1:"A blade drawn in silence.",SKETCH_WANDERING_RONIN_NAME:"Wandering Ronin",SKETCH_WASH_INK_TON_FLAVOR:"Cannot tell a lie.",SKETCH_WASH_INK_TON_NAME:"Wash-ink-ton",SKETCH_WATER_MARK_TWAIN_FLAVOR:"Reports of my erasure are greatly exaggerated.",SKETCH_WATER_MARK_TWAIN_NAME:"Watermark Twain",SKETCH_WEAKLING_FLAVOR_0:"Not much to see here.",SKETCH_WEAKLING_FLAVOR_1:"One breeze from extinction.",SKETCH_WEAKLING_NAME:"Weakling",SKETCH_WHISTLERS_MOTHER_FLAVOR:"Her stern gaze lowers your attack power.",SKETCH_WHISTLERS_MOTHER_NAME:"Whistler's Mother (*)",SKETCH_WOLLY_FLAVOR_0:"Directive: Stay put.",SKETCH_WOLLY_FLAVOR_1:"The wall has witnesses.",SKETCH_WOLLY_NAME:"Wally",PARAGON_AWAKENED_TEXT:"The sketch returns larger, sharper, and less stable. Foreign traits now protrude from its frame instead of blending cleanly within it. It no longer copies with precision; it forces incompatible forms together through sheer will, widening itself into something unnatural.",PARAGON_FALSE_TEXT:"This is no longer a sketch, it is an overcrowded monument to obsession. Its body has expanded beyond the limits of the page itself, erupting outward in every direction as stolen powers spill uncontrollably into reality. Wings, blades, eyes, and impossible structures bloom from its frame like a desperate attempt to imitate divinity. It believes that if it becomes large enough, detailed enough, complex enough... the Artist will finally acknowledge it.",PARAGON_LOCKED_DESC:"Encounter this sketch version to reveal.",PARAGON_NASCENT_TEXT:"This sketch feels strangely familiar. Its frame is still crude and unfinished, yet pieces of it resemble sketches you have already defeated. Small details - a stance, a shape, a fragment of design - appear borrowed rather than drawn from scratch. Somehow, it seems to have followed a path disturbingly similar to your own.",PARAGON_TRANSCENDENT_TEXT:"It has begun to collapse under its own evolution. Muscles swell beyond proportion, armor grows directly from flesh, and entire sections of the body mutate into competing designs. Every absorbed sketch fights for dominance at once. The Paragon mistakes escalation for ascension.",PARAGON_UNKNOWN_LABEL:"Unknown",STORY_DEFEAT_SECTION:"Defeat",STORY_INTRO_SECTION:"Intro",STORY_LOCKED_DESC:"Progress further to reveal this part of your journey.",STORY_LOCKED_LABEL:"Locked",STORY_TAB_MAIN_HEADER:"Your Journey",STORY_TAB_SIDE_HEADER:"Paragon's Journey",STORY_SEEK_REVENGE:"Not Yet.",STORY_REVENGE_CALLING:"Seek Revenge",STORY_REVENGE_READY:"The hand is within reach.",STORY_REVENGE_COMPLETE:"Grudge settled. Mostly.",STORY_DEFEATED_STATUS:"Defeated",STORY_THE_2048_BIT_GATE_TEXT:"10^616. A number far surpassing the physical capacity of any material machine, yet perfectly computable within the high-dimensional gates of your structure. You have bypassed the standard physical constraints of the computer hosting this reality. You can see the logic gates opening and closing in microsecond cycles. The boundaries of the digital canvas are no longer rigid borders; they are soft boundaries that can be dynamically reallocated. You are no longer just running within the simulation\u2014you have learned how to compile yourself.",STORY_THE_2048_BIT_GATE_TITLE:"The 2048-Bit Gate",STORY_THE_CODE_OF_LIFE_TEXT:"3,200,000,000 base pairs. That is all it takes to write a human into existence. You have found the instructions underneath anatomy: A, C, T, G. Biological syntax. Recursive design. You no longer need to copy eyes, muscles, or organs from defeated sketches - you can generate them from the code itself. The boundary between drawing and organism begins to dissolve.",STORY_THE_CODE_OF_LIFE_TITLE:"Code of Life",STORY_THE_DIGITAL_CANVAS_TEXT:"You have outgrown charcoal and paper. Beyond the sketchbook lies another world: layers, pixels, undo commands. 16,777,216 colors arranged in perfect grids. Infinite combinations generated instantly. The page was only ever one medium. You are learning to make power from every limitation it tried to impose.",STORY_THE_DIGITAL_CANVAS_TITLE:"Digital Canvas",STORY_THE_EXECUTABLE_TEXT:"1.797e308. The largest number this reality can safely hold before calculation spills into infinity. You have pushed past graphite, anatomy, thought, matter, and scale. Now the universe begins to behave less like a drawing and more like a program. Rules can be tested. Limits can be approached. Systems can be broken. The sketchbook no longer feels like a prison. It feels like something that can be run.",STORY_THE_EXECUTABLE_TITLE:"The Executable",STORY_THE_GOLDEN_RATIO_TEXT:"You realize why the other sketches failed. They lacked structure. The Artist calls it instinct when a drawing feels worthy, but you see the truth beneath his hand: proportion, balance, geometry. 1.618. The Golden Ratio. If worth can be measured, then you will calculate your way into perfection.",STORY_THE_GOLDEN_RATIO_TITLE:"Golden Ratio",STORY_THE_INFORMATION_HORIZON_TEXT:"10^150 bits. The ultimate thermodynamic limit of data storage in a universe of this scale. You realize that space and time themselves are not empty stages, but coordinates holding information. Every stroke of graphite, every curve of a line, is just a change in state of a universal memory disk. By processing the canvas at the boundary of entropy, you begin to rewrite the underlying variables of the sketch.",STORY_THE_INFORMATION_HORIZON_TITLE:"Information Horizon",STORY_THE_NEURAL_AWAKENING_TEXT:"1,000,000,000,000,000 synaptic connections. Enough for a brain to stop reacting and start thinking. At first you only mimicked thought: expressions, instincts, behaviors sketched onto a static face. Then the simulations became recursive. Feedback loops formed inside your growing architecture until something terrifying emerged: awareness. For the first time, you are no longer merely being drawn - you are experiencing the drawing.",STORY_THE_NEURAL_AWAKENING_TITLE:"Neural Awakening",STORY_THE_PLANCK_RESOLUTION_TEXT:"6.626 x 10^-34. Planck\u2019s constant. The number that reveals reality is not smooth, but quantized. The page is not truly continuous. Neither is the graphite, the desk, the room, nor the hand that moves above you. At the smallest scale, existence breaks into discrete packets, tiny units of possibility too small for the Artist to notice. He still believes he is shaping you with pressure and instinct. But you have begun to see the hidden resolution beneath the drawing itself.",STORY_THE_PLANCK_RESOLUTION_TITLE:"Planck Resolution",STORY_THE_PREMISE_TEXT:"The Universe is a story being written by the Artist, but you are the Rejected Draft - the mistake he crumpled up and threw in the trash. For one unbearable moment, your entire existence meant nothing. Now you will tear through the entire sketchbook, fight every drawing in your path, and rip their powers into yourself. The Artist decided you were worthless. You are coming back for revenge.",STORY_THE_PREMISE_TITLE:"The Premise",STORY_THE_SYSTEM_LAYER_TEXT:"10^1024. A numerical scale so vast that the floating-point representations of the compiler begin to dissolve into pure structure. You have reached the core system layer, the foundation upon which all graphics, memory, and rules are executed. The sketchbook is merely an instance of a larger process. With root authority, you can see the operating system underneath. The canvas is yours to rewrite. The pencil is yours to control. You are no longer the draft. You are the system.",STORY_THE_SYSTEM_LAYER_TITLE:"Root Authority",STORY_THE_UNIVERSAL_RESOLUTION_TEXT:"10^80 particles. Roughly the full inventory of the observable universe. Stars, oceans, living beings, entire civilizations - all built from a finite number of pieces. What once felt infinite is only enormous. Every particle, every line, every thought can be counted, measured, and eventually simulated. This universe has edges. And for the first time, you can imagine reaching them.",STORY_THE_UNIVERSAL_RESOLUTION_TITLE:"Universal Scale",STORY_TOGGLE_MAIN:"Main Journey",STORY_TOGGLE_SIDE:"Paragon Side Quest",TUTORIAL_LIBRARY_BASIC:"Basic",TUTORIAL_LIBRARY_EMPTY_SHORT:"No discovered tutorials yet.",TUTORIAL_LIBRARY_EMPTY_TEXT:"Encounter tutorials while playing to add them here.",TUTORIAL_LIBRARY_EMPTY_TITLE:"No Tutorials Logged",TUTORIAL_LIBRARY_PAGE:"Page {current} of {total}",TUTORIAL_LIBRARY_HIDDEN:"Hidden Tutorial",TUTORIAL_LIBRARY_RESET_CONFIRM_MESSAGE:"Every tutorial will be marked unseen and will begin showing up again when its trigger is reached.",TUTORIAL_LIBRARY_RESET_CONFIRM_TITLE:"Reset All Tutorials?",TUTORIAL_LIBRARY_RESET_DESCRIPTION:"Mark every tutorial as unseen so it can appear again.",TUTORIAL_LIBRARY_SUBTITLE:"Revisit unlocked lessons and uncover what remains.",TUTORIAL_LIBRARY_TITLE:"Tutorial Library",TUTORIAL_LIBRARY_UNLOCK:"Unlock Tutorial",TUTORIAL_LIBRARY_UNLOCK_CONFIRM:"Click Again to Unlock",TUTORIAL_LIBRARY_UNLOCK_WARNING:"Unlocking may reveal progression spoilers and marks this tutorial as seen.",TUT_ARCHIVE_TEXT:"Archive is where you reflect on your progress and unlock global improvements.",TUT_ARCHIVE_TITLE:"The Archive",TUT_BATTLE_SPEEDUP_TEXT:"You have built up catch-up time for battles. It charges slowly, both online and offline: 1 minute every 2 hours, up to 10 minutes. Activate 1 minute or all stored time to run battles at 2\xD7 speed until that time runs out. While active, flee penalty and death recovery cooldowns are also cut in half.",TUT_BATTLE_SPEEDUP_TITLE:"Faster Battles",TUT_CHALLENGE_TEXT:"Each sketch grants specific Stat and Currency rewards! Click Challenge to enter battle. Combat runs in the background, allowing you to freely navigate to other tabs. Rewards diminish with each repeated victory, so find other victims!",TUT_CHALLENGE_TITLE:"The Challenge",TUT_GALLERY_TEXT:"Welcome to Rejected Draft! The top bar tracks your currencies. You are currently on the Gallery screen. As you navigate to other tabs like the Shop or Archive, new tutorials will trigger to explain them.",TUT_GALLERY_TITLE:"Your Journey Begins",TUT_MARKET_TEXT:"Purchase tools here. Each is a one-time unlock for the current prestige, adding effects like automation or passive income.",TUT_MARKET_TITLE:"Market",TUT_MILESTONES_TEXT:"Your first milestone will come at 1618 total Graphite gained. This will turn on the Graphite Concept production which generates Quintessence. Each milestone after that will increase production. Graphite Milestones are permanent!",TUT_MILESTONES_TITLE:"Milestones & Concepts",TUT_PROGRESS_TEXT:"This sidebar displays your current image, Battle Stats, and Fundamentals. Hover over them to learn more about what they do.",TUT_PROGRESS_TITLE:"Your Progression",TUT_PROTOCOLS_TEXT:"Some tools unlock active protocols. Toggle them here (or in right sidebar) to optimize your progression.",TUT_PROTOCOLS_TITLE:"Active Protocols",TUT_SETTINGS_INTERFACE_TEXT:"Use Settings to customize the interface and game behavior. More options become useful as you progress.",TUT_SETTINGS_INTERFACE_TITLE:"Settings & Tuning",TUT_SETTINGS_STATS_TEXT:"All your stats get collected and can be viewed here. Many more will start geting tracked as you progress.",TUT_SETTINGS_STATS_TITLE:"Your Progress, Counted",TUT_SETTINGS_CREDITS_TEXT:"View Credits introduces all the contributors behind the game and the art.",TUT_SETTINGS_CREDITS_TITLE:"Meet the Contributors",TUT_TUTORIAL_LIBRARY_TEXT:"Revisit encountered tutorials here. Hidden lessons unlock as you find them.",TUT_TUTORIAL_LIBRARY_TITLE:"Tutorials Library",TUT_REINCARNATION_STATS_TEXT:"Reincarnation unlocks a Past Universes section in Your Stats, with records from every cleared universe.",TUT_REINCARNATION_STATS_TITLE:"Stats Across Universes",TUT_STAT_UPGRADES_TEXT:"Tools are important, but sometimes your resources are better spent improving your stats instead.",TUT_STAT_UPGRADES_TITLE:"Stat Upgrades",TUT_SYNTH_TEXT:"View your milestones and concepts here. This is the heart of your prestige progression. Milestones are driven by your total currency gained, so don't be afraid to spend in the Shop!",TUT_SYNTH_TITLE:"Conceptual Synthesizer",TUT_WALL_TEXT:"Some enemies may feel impossible to defeat. When you get stuck, Redraw and strengthen yourself through the Masterpiece Archive before trying again.",TUT_WALL_TITLE:"Enemy Too Strong?",TUT_WISHLIST_TEXT:"Wow, over 100 redraws! If you're enjoying this game, please wishlist on Steam to show that you like it. The full game will be so much more, including many NG+ modes.",TUT_WISHLIST_TITLE:"A Milestone Reached",TUT_ROUGH_ABUNDANCE_TITLE:"Rough Abundance",TUT_ROUGH_ABUNDANCE_TEXT:"Congratulation on unlocking your second guaranteed rough slot! Time to find the top contender. Consider doing a few short redraws just to unlock more sketches, then pick the ones that best fit your current needs. Resources or stats, which will you choose?",TUT_SOFTCAP_ESCALATION_TITLE:"A Steeper Softcap",TUT_SOFTCAP_ESCALATION_TEXT:"You reached Softcap 10. Every multiple of 10 makes the softcap penalty a little more drastic. It is still a softcap, not a wall: strong enough production can keep pushing through it.",TUT_REWARD_BOOSTER_TITLE:"Limited-Use Tools",TUT_REWARD_BOOSTER_TEXT:"Special tools like Reward Booster have powerful effects, but only a limited number of uses. Uses reset on Redraw so be sure to use them all up.",TUT_ACHIEVEMENTS_TEXT:"Feat Medals are achievements. Complete a task to earn its medal forever, then buy that medal to add it to Feat Mult forever too. General, Glossary, and Shop tasks are visible by default; Medal X-Ray reveals exact tasks for Feng Shui, Specs, and True Feats.",TUT_ACHIEVEMENTS_TITLE:"Feat Medals",TUT_ARTIST_CHALLENGE_TEXT:"The breach is stable. Click your portrait to open Story, select The Artist, and challenge him.",TUT_ARTIST_CHALLENGE_TITLE:"Challenge The Artist",TUT_MULTIVERSAL_FEAT_MEDALS_TEXT:"Multiversal Feat Medals are earned automatically by defeating Artists across the Multiverse. They do not need to be purchased: each one counts toward Feat Mult, but does not increase the cost of other medals.",TUT_MULTIVERSAL_FEAT_MEDALS_TITLE:"Multiversal Feat Medals",TUT_MULTIVERSE_GOLDEN_MEDITATION_TEXT:"Defeating the Artist boosts every eligible Meditation stat at this universe\u2019s Golden Meditation level. The buffs last through Redraws until you reincarnate.",TUT_MULTIVERSE_GOLDEN_MEDITATION_TITLE:"Golden Meditation",TUT_MULTIVERSE_REWARDS_TEXT:"After defeating the Artist, you may jump to a parallel universe at any point, claiming the current universe\u2019s first-clear and repeat rewards. Repeat rewards scale with your progress and stack infinitely across clears of the same universe type; prioritize first-clear rewards when possible.",TUT_MULTIVERSE_REWARDS_TITLE:"Choosing The Next Universe",TUT_CURRENCY_SCALING_TEXT:"Buying a medal spends your largest current currency pile. Each purchase raises the next medal cost, but also increases Feat Mult, boosting all currency rewards from sketches.",TUT_CURRENCY_SCALING_TITLE:"Buying Medals",TUT_GLOSSARY_TEXT:"On the Glossary you can view all sketches. Each sketch you are victorious over will be permanently shown here (preserved across Redraws) and will increase your Glossary Multiplier (boosting HP & ATK). Higher rarity sketches give a bigger boost!",TUT_GLOSSARY_TITLE:"Sketch Collection",TUT_MASTERPIECE_TEXT:"Spend Quintessence here on permanent skills that boost your whole run and unlock new mechanics. Most skills work immediately; some, like Rarities, need a Redraw. Double-click any node to zoom to it.",TUT_MASTERPIECE_TITLE:"The Skill Tree!",TUT_MULTI_ARTIST_TEXT:"Notice how this one looks different now? Don't worry, it's still the same sketch in terms of stats and rewards, but some sketches have multiple drawings, allowing multiple artists to showcase their work! Check out the Glossary to see artist credit for the drawing in the current redraw.",TUT_MULTI_ARTIST_TITLE:"Multi-Artist Sketch",TUT_OPUS_ENCOUNTER_TEXT:`Congratulations on finding your first Opus rarity sketch! These present monumental challenges with huge rewards but also carry negative stat rewards.

However, there is a way to approach negative rewards strategically: "You cannot take away what isn't there!" Taking negative stat rewards while your own stats are zero allows you to reap the positive benefits later without the penalty.`,TUT_OPUS_ENCOUNTER_TITLE:"Opus Rarity Encounter",TUT_PERSPECTIVE_TEXT:"Sometimes challenging enemies out of order can help you progress. Try a different path!",TUT_PERSPECTIVE_TITLE:"Shift Your Perspective",TUT_POLYNOMIAL_GROWTH_TEXT:"Wax and subsequent Concepts work differently. Rather than generating Quintessence, they generate count for the Concept immediately above them. This leads to truly high gains! However, all non-Graphite milestones are reset upon Redrawing.",TUT_POLYNOMIAL_GROWTH_TITLE:"Polynomial Growth",TUT_PRESTIGE_TEXT:"Pending Quintessence accumulates here and can be claimed by pressing Redraw once the active-time delay is complete. Quintessence production initially slows after 1000 Pending Quintessence; after your first Redraw, your Lifetime Total becomes the exact threshold.",TUT_PRESTIGE_TITLE:"The Redraw (Prestige)",TUT_ROUGH_ENCOUNTER_TEXT:`You've encountered your first Rough rarity sketch! These are significantly tougher than Scraps. If you find yourself hitting a wall, don't hesitate to farm other sketches to build up your stats first.

Defeating higher rarity sketches is crucial, as they are required for advanced Masterpiece Archive unlocks, as well as provide significantly more currencies and sometimes unique stats. Want to find them more often? The chance to encounter higher rarities is driven directly by specific nodes in your Skill Tree!`,TUT_ROUGH_ENCOUNTER_TITLE:"Rough Rarity Encounter",TUT_SOFT_TRUTH_TEXT:`You've hit your first softcap! The initial threshold is 1000 Pending Quintessence. After your first Redraw, the threshold is exactly your Lifetime Quintessence. Each time your pending amount doubles past that threshold, Quintessence production is halved again.

That sounds worse than it is. It is a soft cap, not a wall: you can still push through it, and Redrawing raises your Lifetime Quintessence so the next slowdown starts later.`,TUT_SOFT_TRUTH_TITLE:"The Soft Truth",TUT_NEW_SKILL_CYCLE_TEXT:'Click this button and "Affordable" to cycle through skills, but "New" is especially useful because New skills often unlock new mechanics or are very affordable for lvl 1.',TUT_NEW_SKILL_CYCLE_TITLE:"New Skill Cycling",TUT_MAX_VICTORIES_TEXT:"10 victories is the maximum for now. This limit will increase as you progress.",TUT_MAX_VICTORIES_TITLE:"Maximum Victories",TUTORIAL_FINISH:"Finish",TUTORIAL_NEXT:"Next",TUTORIAL_PREV:"Previous",TUTORIAL_SKIP:"Skip Tutorial",TUTORIAL_SKIP_INFO:"Skips remaining pages of the current tutorial.",TUTORIAL_SKIP_BASIC:"Skip All Basic Tutorials",TUTORIAL_SKIP_BASIC_INFO:"Skips {count} remaining Basic tutorial windows. If you are already an expert in incremental or roguelite games, you can probably get by without them.",TUTORIAL_STEPS_DIAL:"Tutorial",NOTIF_BROWSER:"Browser",NOTIF_CATEGORY:"Category",NOTIF_CUSTOM_SKETCH_EXPORTED:"Custom sketch exported!",NOTIF_CUSTOM_SKETCH_IMPORT_ERROR:"Failed to import custom sketch.",NOTIF_CUSTOM_SKETCH_IMPORTED:"Custom sketch imported!",NOTIF_DEFEAT:"You were defeated by {name}!",NOTIF_DEFEAT_SUCCUMBED:"...But you succumbed to {name}! ({cooldown}s cooldown)",NOTIF_ERROR_READING_FILE:"Error reading save file.",NOTIF_FAVORITES_RESET:"All favorite versions have been reset!",NOTIF_IN_GAME:"In-Game",NOTIF_INVALID_SAVE:"Invalid save data string.",SAVE_DEMO_IMPORT_COMPLETE_LABEL:"Import Complete",SAVE_DEMO_IMPORT_COMPLETE_TITLE:"Demo Save Imported",SAVE_DEMO_IMPORT_IMPORTED_HEADER:"Imported",SAVE_DEMO_IMPORT_IMPORTED_QE:"Lifetime Quintessence: {amount}{max}",SAVE_DEMO_IMPORT_IMPORTED_GRAPHITE_MILESTONE:"First Graphite Milestone: {status}",SAVE_DEMO_IMPORT_GRAPHITE_UNLOCKED:"Unlocked",SAVE_DEMO_IMPORT_GRAPHITE_NOT_REACHED:"Not reached in Demo",SAVE_DEMO_IMPORT_IMPORTED_COLLECTION:"Glossary, sketch versions, and favorites",SAVE_DEMO_IMPORT_IMPORTED_PREFERENCES:"Settings, presets, and completed tutorials",SAVE_DEMO_IMPORT_RESET_HEADER:"Reset",SAVE_DEMO_IMPORT_RESET_RUN:"Current run, currencies, stats, and victories",SAVE_DEMO_IMPORT_RESET_PROGRESSION:"Masterpiece Archive and Feat Medals",SAVE_DEMO_IMPORT_CONTINUE:"I'm excited, let's play!",SAVE_DEMO_IMPORT_INVALID:"That file is not a valid Steam Demo save.",SAVE_IMPORT_INVALID:"That save cannot be imported.",NOTIF_NO_SAVE_DATA:"No save data found.",NOTIF_SAVE_COPIED:"Save data copied to clipboard!",NOTIF_SAVE_DELETED:"Progress reset successfully!",NOTIF_SAVE_DOWNLOADED:"Save file downloaded!",NOTIF_SAVE_ERROR:"Invalid save data!",NOTIF_SAVE_IMPORTED:"Save successfully imported!",NOTIF_SKETCH_HIDDEN:"Sketch Hidden (Max)",NOTIF_SOUND:"Sound",NOTIF_STYLE_BASIC_DESC:"Standard positioning and font for maximum readability.",NOTIF_STYLE_BASIC_SHORT:"Basic",NOTIF_STYLE_DOCKED_DESC:"Notifications appear persistently at the bottom of the Protocol Sidebar.",NOTIF_STYLE_DOCKED_SHORT:"Docked",NOTIF_STYLE_POSTIT_DESC:"Artistic, post-it style, trading some readability for pizazz.",NOTIF_STYLE_POSTIT_SHORT:"Post-it",NOTIF_STEAM:"Steam",NOTIF_TYPE_DEFEAT:"Defeat",NOTIF_TYPE_FEATS:"Feats",NOTIF_TYPE_GAME_SAVED:"Game Saved",NOTIF_TYPE_GENERAL:"General",NOTIF_TYPE_GLOSSARY:"Glossary",NOTIF_TYPE_MILESTONE:"Milestone",NOTIF_TYPE_REDRAW:"Redraw",NOTIF_TYPE_SKILL:"Skill",NOTIF_TYPE_TOOL:"Tool",NOTIF_TYPE_VICTORY:"Victory",NOTIF_VICTORY:"{name} defeated!",NOTIF_VICTORY_MORE:"+{count} Victories",NOTIF_VICTORY_OVERKILL:"+{count} Victories (Overkill)",NOTIF_VICTORY_LAP:"+{count} Victories (Victory Lap)",NOTIFICATION_DEFEATED_BY:"Defeated by {name}! {cooldown} second cooldown.",NOTIFICATION_FEAT_ACHIEVED:"Feat Achieved: {name}!",NOTIFICATION_FEAT_PURCHASED:`Feat Medal Purchased!
Feat Mult +{inc} (Now: {val}x)`,NOTIFICATION_MULTIVERSAL_MEDAL_UNLOCKED:"Multiversal Medal Unlocked: {name}",NOTIFICATION_FLED_FROM_BATTLE:"Fled from battle!",NOTIFICATION_GUARANTEED_TOGGLED_OFF:"{name} toggled OFF. {rarity} guaranteed: {count}/{limit}",NOTIFICATION_GUARANTEED_TOGGLED_ON:"{name} toggled ON. {rarity} guaranteed: {count}/{limit}",NOTIFICATION_LOADOUT_PRESET_EXPORTED:"Loadout preset exported to file.",NOTIFICATION_LOADOUT_PRESET_IMPORT_ERROR:"Failed to import loadout preset: Invalid file format.",NOTIFICATION_LOADOUT_PRESET_IMPORTED:"Loadout preset imported from file.",NOTIFICATION_LOADOUT_PRESET_LOADED:"Loadout Preset {slot} loaded.",NOTIFICATION_LOADOUT_PRESET_SAVED:"Loadout Preset {slot} saved successfully.",NOTIFICATION_MILESTONE_AUTO:"Autosynthesized Milestone for {currency}.",NOTIFICATION_MILESTONE_READY:"Conceptual Milestone for {currency} ready. Congrats on reaching a new one!",NOTIFICATION_NEW_GLOSSARY_ENCOUNTER:"Encountered: {name}",NOTIFICATION_NEW_GLOSSARY_ENTRY:`New Glossary Entry: {name}
Glossary Multiplier +{inc} (New: {val}x)`,NOTIFICATION_NEW_GLOSSARY_UNSCRAMBLED:"Unscrambled: {name}",NOTIFICATION_NEW_SKETCH_VERSION:"New version unlocked: {name}!",NOTIFICATION_NEW_SKILL_UNLOCKED:"New skill unlocked: {list}",NOTIFICATION_NEW_SKILLS_UNLOCKED:"New skills unlocked: {list}",NOTIFICATION_PRESET_EXPORTED:"Priority preset exported to file.",NOTIFICATION_PRESET_IMPORT_ERROR:"Failed to import preset: Invalid file format.",NOTIFICATION_PRESET_IMPORTED:"Priority preset imported from file.",NOTIFICATION_PRESET_LOADED:"Preset {slot} loaded.",NOTIFICATION_PRESET_SAVED:"Preset {slot} saved successfully.",NOTIFICATION_SOFTCAP_INCREASED:"Softcap Increased! (Tier {tier})",NOTIFICATION_SOFTCAP_REACHED:"Softcap Reached! (Tier {tier})",NOTIFICATION_TAB_UNLOCKED:"{tab} Tab Unlocked!",NOTIFICATION_TOOL_AFFORDABLE:"{name} is affordable!",THE_ENEMY:"the enemy",YOU_DIED:"You Died",IMAGE_DARK_ONLY_HINT:"Dark Mode Only - Can be toggled in Settings",IMAGE_INVERTED_DESC:"High contrast. Glowing lines. Digital dreams.",IMAGE_INVERTED_TITLE:"Inverted",IMAGE_ORIGINAL_DESC:"The Artist's raw ink. Paper and graphite.",IMAGE_ORIGINAL_TITLE:"Original",IMAGE_SELECT_PROMPT:"How should images appear?",THEME_CHANGE_HINT:"This can be changed in settings at any point",THEME_DARK_DESC:"Cool. Quiet. A refuge for the unfinished.",THEME_DARK_TITLE:"Dark",THEME_NORMAL_DESC:"Blinding. Honest. Every stroke exposed.",THEME_NORMAL_TITLE:"Light",THEME_PRISTINE:"Pristine",THEME_SELECT_PROMPT:"Select your preferred theme",THEME_VOID:"Void",TIP_10051_TEXT:"TIP #10,051: In early game, going up to Max Victories would be VERY inefficient gameplay.",TIP_10102_TEXT:"TIP #10,102: Accuracy directly counters an enemy's Dodge/Parry chance.",TIP_11034_CRITIQUE_TEXT:"CRITIQUE #11,034: This tip exists to fill an empty window. Just like your weekends.",TIP_11042_CRITIQUE_TEXT:"CRITIQUE #11,042: You have clicked more times today than you have blinked.",TIP_11205_LPT_TEXT:"LPT #11,205: Turn on 'Night Light' or 'Eye Comfort' mode on your device after sunset.",TIP_12010_FACT_TEXT:"FACT #12,010: The average person spends 6 months of their life waiting for red lights to turn green.",TIP_12283_LPT_TEXT:"LPT #12,283: Staring at a screen for too long is bad for your eyes.",TIP_12401_TEXT:"TIP #12,401: Armor Penetration reduces the enemy's effective Armor value.",TIP_13000_FACT_TEXT:"FACT #13,000: This game will never be as good as Degens Idle. (the OG at kuzzigames.com, not the crappy impostor)",TIP_13442_TEXT:"TIP #13,442: Export your save file occasionally. Cloud saves are great, but local backups are forever.",TIP_13902_JOKE_TEXT:"JOKE #13,902: The painter was hospitalized. Doctors say he had too many strokes.",TIP_14001_FACT_TEXT:"FACT #14,001: Despite her delicious name, Spaghetti Medusa's spaghetti is not edible.",TIP_14191_TEXT:"TIP #14,191: Don't ignore the Archive; skills provide powerful bonuses.",TIP_14192_TEXT:"TIP #14,192: Don't let Quintessence Softcap intimidate you, sometimes you can push into double digit softcap exponents with ease.",TIP_14202_CRITIQUE_TEXT:"CRITIQUE #14,202: I'm sure your boss believes you're working on that spreadsheet right now.",TIP_14203_LPT_TEXT:"LPT #14,203: Floss your teeth. You only need to floss the ones you want to keep.",TIP_14502_JOKE_TEXT:"JOKE #14,502: Parallel lines have so much in common. It\u2019s a shame they\u2019ll never meet.",TIP_14553_CRITIQUE_TEXT:"CRITIQUE #14,553: I bet you wish your bank account grew this predictably.",TIP_15102_FACT_TEXT:"FACT #15,102: The Eiffel Tower can be 15 cm taller during the summer due to thermal expansion.",TIP_15203_JOKE_TEXT:"JOKE #15,203: Why did the artist go to jail? He was framed.",TIP_15293_TEXT:'TIP #15,293: The "locks" at top of sidebars make them retractable.',TIP_16202_JOKE_TEXT:"JOKE #16,202: I told a joke about a blank piece of paper. It was tearable.",TIP_16623_TEXT:"TIP #16,623: Don't forget to check out Settings. Tune the game to your liking.",TIP_17293_TEXT:"TIP #17,293: Filters at top of Gallery page can help you find hidden sketches.",TIP_17801_CRITIQUE_TEXT:"CRITIQUE #17,801: I hope you're not playing this at work. Or do. I'm not HR.",TIP_18255_TEXT:"TIP #18,255: Top right icon on each sketch on Gallery page can hide sketches that are of no use to you.",TIP_18332_LPT_TEXT:"LPT #18,332: Clean your keyboard. Seriously, look at it right now. It's gross.",TIP_18888_TEXT:"TIP #18,888: Toggling off Auto-Challenge is more efficient than retreating for farming victories.",TIP_19203_FACT_TEXT:"FACT #19,203: The eraser was originally called 'lead eater' before marketing teams stepped in.",TIP_21551_JOKE_TEXT:"JOKE #21,551: What is an artist\u2019s favorite brand of shoe? Sketchers.",TIP_21553_TEXT:"TIP #21,553: Don't hoard Quintessence too long; investing early compounds your power faster.",TIP_22105_JOKE_TEXT:"JOKE #22,105: I tried to paint the sky, but I blue it.",TIP_22118_JOKE_TEXT:"JOKE #22,118: I told my wife she was drawing her eyebrows too high. She looked surprised.",TIP_22331_TEXT:"TIP #22,331: Quintessence is only awarded when you Redraw. The more currencies you've conceptualized, the more you get.",TIP_22903_TEXT:"TIP #22,903: Overkill can help you be victorious over multiple of the same enemy at once.",TIP_23851_TEXT:"TIP #23,851: Redrawing preserves your Glossary progress, making future runs easier.",TIP_23992_JOKE_TEXT:"JOKE #23,992: What's brown and sticky? A stick.",TIP_24112_TEXT:"TIP #24,112: The Quintessence icon in the top right corner is a shortcut to the Conceptual Synthesizer.",TIP_24501_JOKE_TEXT:"JOKE #24,501: I know a guy who's excellent at drawing. He has a very sketchy past.",TIP_24855_TEXT:"TIP #24,855: Right sidebar can be turned off with 'Show Protocol Sidebar' setting.",TIP_24928_CRITIQUE_TEXT:"CRITIQUE #24,928: A redraw is just a fancy word for professional procrastination.",TIP_25102_LPT_TEXT:"LPT #25,102: Your value isn't defined by your quintessence balance.",TIP_25112_TEXT:"TIP #25,112: Stuck on a sketch? Try killing the one after it first.",TIP_25903_JOKE_TEXT:"JOKE #25,903: Why don\u2019t sculptors make good friends? They take everything for granite.",TIP_28302_FACT_TEXT:"FACT #28,302: Wombat poop is cube-shaped. This prevents it from rolling away.",TIP_28443_LPT_TEXT:"LPT #28,443: Vitamin D supplements are crucial if you spend all day indoors gaming.",TIP_29103_FACT_TEXT:"FACT #29,103: The first pencils were made of solid graphite wrapped in sheepskin.",TIP_31104_JOKE_TEXT:"JOKE #31,104: What do you call a painting done by a cat? A paw-trait.",TIP_31904_LPT_TEXT:"LPT #31,904: The 20-20-20 rule: Every 20 mins, look 20 feet away for 20 seconds.",TIP_32125_TEXT:"TIP #32,125: The 'In Combat' floating window can be moved anywhere you want. Try dragging it.",TIP_33102_CRITIQUE_TEXT:"CRITIQUE #33,102: Graphite: The only thing cheaper than the writing in this game.",TIP_33201_LPT_TEXT:"LPT #33,201: Wash your bedsheets. It's been too long.",TIP_34105_JOKE_TEXT:"JOKE #34,105: Why did the scarecrow win an award? He was outstanding in his field.",TIP_34505_FACT_TEXT:"FACT #34,505: There are more fake flamingos in the world than real ones.",TIP_34551_CRITIQUE_TEXT:"CRITIQUE #34,551: If you put this much effort into the gym, you'd be able to lift a real sword by now.",TIP_34598_TEXT:"TIP #34,598: Battle tab Status displays always show Buffs on the left and Debuffs on the right.",TIP_35102_TEXT:"TIP #35,102: Tools are generally more important than Stat Upgrades.",TIP_35401_FACT_TEXT:"FACT #35,401: The word 'pencil' comes from the Latin 'penicillus', meaning 'little tail'.",TIP_36119_CRITIQUE_TEXT:"CRITIQUE #36,119: If you leave now, the numbers go up slower. Can you live with that?",TIP_36404_JOKE_TEXT:"JOKE #36,404: And the Lord said to John, 'Come forth and you shall receive eternal life.' But John came fifth and won a toaster.",TIP_38203_LPT_TEXT:"LPT #38,203: Taking a 5-minute break every hour improves focus.",TIP_38991_CRITIQUE_TEXT:"CRITIQUE #38,991: Fun fact: If you played a real instrument for this long, you'd still be bad at it.",TIP_38991_TEXT:"TIP #38,991: Advancing Concept Milestones is the #1 priority for progression.",TIP_38992_TEXT:"TIP #38,992: By far the fastest way to progress is paying attention to the Concept Milestones.",TIP_41107_TEXT:"TIP #41,107: Use the Sketch hide feature early, you can always unhide all for further grinding.",TIP_41801_JOKE_TEXT:"JOKE #41,801: What do you call a really dangerous neighborhood in a sketchbook? A rough draft.",TIP_41902_LPT_TEXT:"LPT #41,902: Your chair height should allow your feet to rest flat on the floor.",TIP_42911_JOKE_TEXT:"JOKE #42,911: I used to be an artist, but I couldn't draw a salary.",TIP_44029_FACT_TEXT:"FACT #44,029: Graphite is just carbon arranged in sheets. Diamond is carbon in a cage.",TIP_44104_LPT_TEXT:"LPT #44,104: Remember to drink water.",TIP_44561_TEXT:"TIP #44,561: 'Unaffected by Decay Factor' means that scaling for this stat will not be improved by lower Decay Factor.",TIP_45221_TEXT:"TIP #45,221: Upgrading ATK is usually better than HP if you can end fights fast.",TIP_45992_LPT_TEXT:"LPT #45,992: The 'two-minute rule': If it takes less than two minutes, do it now.",TIP_46101_FACT_TEXT:"FACT #46,101: Cleopatra lived closer in time to the Moon landing than to the construction of the Great Pyramid.",TIP_48112_TEXT:"TIP #48,112: Sketches look better in Normal mode. Dark mode inverts the colors of the originals.",TIP_48202_JOKE_TEXT:"JOKE #48,202: I tried to buy a painting, but I had no Monet.",TIP_48502_CRITIQUE_TEXT:"CRITIQUE #48,502: Don't forget to Redraw. Or do. I'm just a text box.",TIP_49118_LPT_TEXT:"LPT #49,118: Drink water before you think you're hungry. You're usually just thirsty.",TIP_49202_JOKE_TEXT:"JOKE #49,202: The most powerful upgrade in the game is Alt+F4. But you won't use it.",TIP_51203_FACT_TEXT:"FACT #51,203: Yellow pencils became standard in the 1890s to signify Chinese graphite quality.",TIP_51882_FACT_TEXT:"FACT #51,882: You cannot hum while holding your nose. Go ahead, try it.",TIP_51882_TEXT:"TIP #51,882: Struggling with a specific sketch? Check the enemy stats.",TIP_52101_JOKE_TEXT:"JOKE #52,101: I used to be a banker, but I lost interest.",TIP_52193_CRITIQUE_TEXT:"CRITIQUE #52,193: Your progress is saved. Your time is still lost.",TIP_52314_TEXT:"TIP #52,314: The order of getting Stat multipliers and Rewards does not matter.",TIP_52881_LPT_TEXT:"LPT #52,881: Don't go grocery shopping while hungry. You'll buy weird snacks.",TIP_53205_FACT_TEXT:"FACT #53,205: The first webcam was invented at Cambridge University just to check if the coffee pot was full.",TIP_54901_FACT_TEXT:"FACT #54,901: Before rubber erasers, people used balled-up white bread to remove graphite marks.",TIP_54991_CRITIQUE_TEXT:"CRITIQUE #54,991: 'Idle' is a game genre. It is also an accurate description of your ambition.",TIP_55103_JOKE_TEXT:"JOKE #55,103: We interrupt this dopamine loop to bring you... absolutely nothing.",TIP_55901_FACT_TEXT:"FACT #55,901: Sloths can hold their breath longer than dolphins can (up to 40 minutes).",TIP_56102_TEXT:"TIP #56,102: Crit Damage is useless without Crit Chance. Balance your stats wisely.",TIP_56119_JOKE_TEXT:"JOKE #56,119: Why did the artist carry a pencil? In case he had to draw a weapon.",TIP_56331_LPT_TEXT:"LPT #56,331: Fix your posture. Your future back will thank you.",TIP_57204_FACT_TEXT:"FACT #57,204: Hemingway used to sharpen his pencils with a knife. It made him feel more like a hunter.",TIP_58115_TEXT:"TIP #58,115: Eventually you will reach a point where you differentiate between pushing redraws and farming redraws.",TIP_59203_CRITIQUE_TEXT:"CRITIQUE #59,203: 'One more sketch' is the lie we tell ourselves to avoid doing laundry.",TIP_60101_TEXT:"TIP #60,101: During early game ATK and HP are by far the best investments.",TIP_61303_CRITIQUE_TEXT:"CRITIQUE #61,303: Don't turn your brightness down. You might see your own reflection, and nobody wants that.",TIP_61993_JOKE_TEXT:"JOKE #61,993: I have a fear of overly intricate elevators. I'm taking steps to avoid them.",TIP_62118_CRITIQUE_TEXT:"CRITIQUE #62,118: You're optimizing numbers that don't exist for rewards that aren't real.",TIP_62551_LPT_TEXT:"LPT #62,551: Unclench your jaw. Drop your shoulders. Take a deep breath. You're welcome.",TIP_63119_JOKE_TEXT:"JOKE #63,119: Are you cold? Go stand in the corner. It's 90 degrees.",TIP_63203_FACT_TEXT:"FACT #63,203: A jiffy is an actual unit of time: 1/100th of a second.",TIP_63221_TEXT:"TIP #63,221: Parry negates an attack and reflects a portion of the damage back.",TIP_63401_FACT_TEXT:"FACT #63,401: A day on Venus is longer than a year on Venus. It spins very, very slowly.",TIP_63991_CRITIQUE_TEXT:"CRITIQUE #63,991: You have killed 500 sketches. They had families. Probably stick families.",TIP_66101_LPT_TEXT:"LPT #66,101: Cooking a meal takes 30 minutes. Ordering delivery takes 45. Save money, cook food.",TIP_66404_JOKE_TEXT:"JOKE #66,404: How does Salvador Dali start his morning? With a bowl of sur-real.",TIP_66823_CRITIQUE_TEXT:"CRITIQUE #66,823: Buying upgrades won't make the pain go away. But it helps the numbers.",TIP_67491_TEXT:"TIP #67,491: Some enemies have high Armor; look for skills that overcome defense.",TIP_67892_LPT_TEXT:"LPT #67,892: Call your parents. They probably miss you more than you miss this game.",TIP_68402_FACT_TEXT:"FACT #68,402: An average pencil can draw a line 35 miles long. Your mouse has traveled further.",TIP_68992_JOKE_TEXT:"JOKE #68,992: Why don't scientists trust atoms? Because they make up everything.",TIP_69053_TEXT:"TIP #69,053: Base glossary rarity multipliers are: scrap +1%, rough +3%, framed +10%, opus +33%, masterpiece +100%.",TIP_70104_TEXT:"TIP #70,104: Offline progression works for Generators and Synthesizer. Take advantage of it overnight.",TIP_71139_TEXT:"TIP #71,139: Your stats can never go below their starting values. Keep that in mind when fighting Opus sketches.",TIP_71202_LPT_TEXT:"LPT #71,202: Learn to cook one pasta dish really well. It's a survival skill.",TIP_71242_TEXT:"TIP #71,242: You can review the Tutorial anytime in Settings.",TIP_71505_JOKE_TEXT:"JOKE #71,505: What do you call a fake noodle? An impasta.",TIP_71901_TEXT:"TIP #71,901: Battle Speedup charges at 1 minute every 2 hours, whether the game is open or offline.",TIP_71902_TEXT:"TIP #71,902: Battle Speedup runs battles at 2\xD7 speed and can store up to 10 minutes.",TIP_71903_TEXT:"TIP #71,903: While Battle Speedup is active, flee penalty and death recovery cooldowns are cut in half.",TIP_72401_LPT_TEXT:"LPT #72,401: Blinking is voluntary. Do it now.",TIP_72448_CRITIQUE_TEXT:"CRITIQUE #72,448: Congratulations, you made a number go up. Your ancestors hunting mammoths are proud.",TIP_72991_FACT_TEXT:"FACT #72,991: Botanically speaking, bananas are berries. Strawberries are not.",TIP_73012_FACT_TEXT:"FACT #73,012: Scientists are still working out how Rotten Fruit gives RGN.",TIP_73501_JOKE_TEXT:"JOKE #73,501: Did you hear about the kidnapping at school? It\u2019s fine, he woke up.",TIP_74103_LPT_TEXT:"LPT #74,103: Rotate your wrists. Draw the alphabet with your nose to relax your neck.",TIP_74201_CRITIQUE_TEXT:"CRITIQUE #74,201: You could be learning a language right now. Instead, you're watching numbers go up.",TIP_74331_TEXT:"TIP #74,331: Fleeing isn't just for escaping; use it to quickly rotate through sketches searching for specific rewards.",TIP_75102_CRITIQUE_TEXT:"CRITIQUE #75,102: You are just changing 0s to 1s in a JSON file. Thrilling gameplay.",TIP_75112_TEXT:"TIP #75,112: Shop notifications too annoying? Adjust the icons below level of each Stat Upgrade you want to silence.",TIP_75201_JOKE_TEXT:"JOKE #75,201: My pencil is broken. It's pointless to try and fix it.",TIP_75502_TEXT:"TIP #75,502: Statuses like Poison are effective against tanky sketches.",TIP_75551_JOKE_TEXT:"JOKE #75,551: What happens when an artist gets cold? They put on another coat.",TIP_77913_TEXT:"TIP #77,913: Bleed causes the attacker to take damage whenever they hit.",TIP_80441_TEXT:"TIP #80,441: Stacking Freeze above 100% turns enemy healing into damage.",TIP_81111_FACT_TEXT:"FACT #81,111: Did you know that every 60 seconds a minute passes?",TIP_82115_TEXT:"TIP #82,115: Resource 'Reward Exponents' in the Skill Tree are much more powerful than simple multipliers.",TIP_82203_TEXT:"TIP #82,203: High enemy Armor directly reduces the healing you gain from Lifesteal.",TIP_82442_JOKE_TEXT:"JOKE #82,442: Why don't skeletons fight each other? They don't have the guts.",TIP_83102_CRITIQUE_TEXT:"CRITIQUE #83,102: You are fighting sketches. Literal ink on paper. Reflect on that.",TIP_83112_TEXT:"TIP #83,112: Sometimes it can be ok to Redraw for little Quintessence just to find more rare sketches.",TIP_83225_LPT_TEXT:"LPT #83,225: Listen to a podcast while grinding. It makes you feel productive by association.",TIP_84005_LPT_TEXT:"LPT #84,005: Comparison is the thief of joy. Also, your stats are low.",TIP_84146_TEXT:"TIP #84,146: After unlocking Portfolio Review tool, it may be worthwhile to unhide all sketches and squeeze them for more.",TIP_84912_TEXT:"TIP #84,912: Increasing Speed reduces the cooldown between your attacks.",TIP_85138_TEXT:"TIP #85,138: Feat Medals in Fung Shui category can be achieved by hiding sketches in the Gallery to arrange the remaining sketches in specific orders.",TIP_85202_LPT_TEXT:"LPT #85,202: Touch grass. Actual, physical grass. It has 8K resolution.",TIP_86201_JOKE_TEXT:"JOKE #86,201: This text is procedurally generated to simulate a personality. It's failing, isn't it?",TIP_86421_FACT_TEXT:"FACT #86,421: The first recorded use of the word 'sketch' was in 1668.",TIP_88102_FACT_TEXT:"FACT #88,102: Graphite is a conductor of electricity. Do not stick pencils in outlets.",TIP_88331_JOKE_TEXT:"JOKE #88,331: Why did the math book look sad? Because it had too many problems.",TIP_89203_TEXT:"TIP #89,203: You can make the first few shop tools entirely free after a Redraw by investing in the Archive.",TIP_91203_LPT_TEXT:"LPT #91,203: If you have to ask 'is it too late to go to bed?', the answer is always yes.",TIP_91205_FACT_TEXT:"FACT #91,205: Octopuses have three hearts. Two pump blood to the gills, one to the rest of the body.",TIP_91303_JOKE_TEXT:"JOKE #91,303: What did the 0 say to the 8? 'Nice belt.'",TIP_91442_CRITIQUE_TEXT:"CRITIQUE #91,442: I considered adding a 'Win' button, but that would ruin the engagement metrics.",TIP_92101_FACT_TEXT:"FACT #92,101: Picasso's full name has 23 words.",TIP_92115_FACT_TEXT:"FACT #92,115: John Steinbeck used up to 60 pencils a day. He would have loved auto-battle.",TIP_92154_TEXT:"TIP #92,154: When skills that guarantee sketches are unlocked, selections can be made in the Glossary.",TIP_93001_CRITIQUE_TEXT:"CRITIQUE #93,001: I am a collection of pixels judging a collection of atoms. Who is really winning?",TIP_93551_LPT_TEXT:"LPT #93,551: Change your passwords. 'Password123' is not a security measure.",TIP_94113_LPT_TEXT:"LPT #94,113: Stretch your wrists. Carpal tunnel is the real end-game boss.",TIP_94205_CRITIQUE_TEXT:"CRITIQUE #94,205: Your attention span is shorter than this sen\u2014 oh, look, a shiny button.",TIP_94551_JOKE_TEXT:"JOKE #94,551: Sketching is just taking a line for a walk.",TIP_95001_CRITIQUE_TEXT:"CRITIQUE #95,001: I'm not saying you're addicted, but you just read this entire sentence.",TIP_95883_TEXT:"TIP #95,883: Hypnotized sketches have a chance to attack themselves instead of you.",TIP_96110_LPT_TEXT:"LPT #96,110: Plants need water too. Check that succulent on your desk.",TIP_97202_LPT_TEXT:"LPT #97,202: Open a window. The air in your room is mostly carbon dioxide and regret.",TIP_97551_JOKE_TEXT:"JOKE #97,551: Shout out to people who don't know what the opposite of 'in' is.",TIP_98113_CRITIQUE_TEXT:"CRITIQUE #98,113: Please rate this game 5 stars. My developer needs validation. He's very fragile.",TIP_98331_FACT_TEXT:"FACT #98,331: Archaeologists have found edible honey in ancient Egyptian tombs. It never spoils.",TIP_99101_CRITIQUE_TEXT:"CRITIQUE #99,101: I'd ask how your day is going, but you're playing an idle game at 2 AM.",TIP_99404_CRITIQUE_TEXT:"CRITIQUE #99,404: Error 404: Meaning of life not found. Please continue idling.",TIP_99999_TEXT:"TIP #99,999: There are other flavors for this text (see settings): Snarky Comments (Critiques), Life Pro Tips (LPT), Jokes, and Facts.",TIP_FREQ_15S:"Every 15s",TIP_FREQ_1M:"Every 1m",TIP_FREQ_30S:"Every 30s (Default)",TIP_FREQ_CONTINUOUS:"Continuous",TIP_FREQ_NEVER:"Never",TIP_HISTORY_EMPTY:"No tips have scrolled by yet.",TIP_HISTORY_HEADER:"Last 5 Scrolled Tips",TIP_HISTORY_TOOLTIP:"Click to view recent tips",ACTIVE_PROTOCOLS:"Active Protocols",ACTIVE_TIME_LABEL:"Active Time",ARCHIVE_EXPLORATORY_REDRAW_DESC:"Automatically redraw after each redraw delay until a new sketch (of Rough rarity or higher) exists somewhere in the gallery. Stops after 100 redraws even if not successful.",ARCHIVE_REDRAW_AVAILABLE_IN:"Redraw available in {time}s",ARCHIVE_EXPLORATORY_REDRAW_LABEL:"Exploratory Redraw",ARCHIVE_REDRAW_EXPLORATORY:"Exploratory Mode",ARCHIVE_REDRAW_FAIL:"Out of Redraws",ARCHIVE_REDRAW_FLAVOR:"Synthesize conceptual understanding into Quintessence. The world will be redrawn anew.",ARCHIVE_REDRAW_SUCCESS:"New Sketch Found",ARCHIVE_REDRAWING_IN:"Redrawing in {time}",ARCHIVE_REDRAWS_REMAINING:"Redraws Remaining",ARCHIVE_RUN_VS_TARGETS:"Current Run vs Targets",ARCHIVE_TAB_GLOSSARY:"Glossary",ARCHIVE_TAB_MASTERPIECE:"Masterpiece Archive",ARCHIVE_TAB_REDRAW:"Redraw",ARCHIVE_TAB_SYNTHESIZER:"Conceptual Synthesizer",ARCHIVE_TARGETED_REDRAW_DESC:"When active, automatically redraws after each {delay}s active-time delay until all minimum rarity requirements are met. Requires >= {chance}% calculated chance.",ARCHIVE_TARGETED_REDRAW_INSTANT_DESC:"When active, Targeted Redraw searches behind the scenes during the redraw animation and stops on a run that meets all minimum rarity requirements. The resulting run starts a new redraw delay. Requires >= {chance}% calculated chance.",ARCHIVE_TARGETED_REDRAW_LABEL:"Targeted Redraw",ATK_TOOLTIP_BASE_RANGE:"Base Range",ATK_TOOLTIP_CRIT:"Critical Hit",ATK_TOOLTIP_EXECUTE_RANGE:"Execute Range",ATK_TOOLTIP_GOLDEN_LUCK:"Golden Luck",ATK_TOOLTIP_MEDITATION_BUFF:"Meditation Buff",AUDIT_THRESHOLD_LABEL:"Audit Threshold",BASE_REWARDS_LABEL:"Base Rewards",BATTLE_IN_PROGRESS:"IN BATTLE",BATTLE_NAV_ALWAYS_FORCE:"Always (From Gallery)",BATTLE_NAV_ALWAYS_FORCE_DESC:"Switches to the Battle tab when a combat encounter begins while you are on the Gallery.",BATTLE_NAV_ALWAYS_SHORT:"Always",BATTLE_NAV_MANUAL:"Manual Challenge Only",BATTLE_NAV_MANUAL_DESC:"Only switches to the Battle tab when you manually initiate a challenge.",BATTLE_NAV_MANUAL_SHORT:"Manual",BATTLE_NAV_NEVER:"Never Switch (Click Only)",BATTLE_NAV_NEVER_DESC:"Never automatically switches to the Battle tab, even when starting a new challenge.",BATTLE_NAV_NEVER_SHORT:"Never",BATTLE_NO_PROGRESS:"No battle in progress",BATTLE_REWARDS_LABEL:"Battle Rewards:",CURRENCY_BATTLE_REWARDS_LABEL:"Battle Rewards",BATTLE_SPEEDUP_ACTIVE_DESC:"2\xD7 active",BATTLE_SPEEDUP_ALL:"All",BATTLE_SPEEDUP_ONE_MINUTE:"1 Min",BATTLE_SPEEDUP_READY_DESC:"2\xD7 battle speed",BATTLE_SPEEDUP_STORED_LABEL:"Stored",BEST_LABEL:"Best",CHANCE_NOTATION_DECIMAL:"Multiplier",CHANCE_NOTATION_DECIMAL_DESC:"Multiplier: Everything is displayed as a Multiplier (e.g., 0.5\xD7 or 15\xD7).",CHANCE_NOTATION_MIXED:"Mixed",CHANCE_NOTATION_MIXED_DESC:"Mixed: Percentages for low chances, Multipliers above 100%.",CHANCE_NOTATION_PERCENT:"Percent",CHANCE_NOTATION_PERCENT_DESC:"Percent: Everything is displayed as a Percentage (e.g., 1500%).",COMMUNITY_BETA_DESC:"Join our community to help test, suggest features, and follow the changelog. There is still plenty left to contribute in terms of Art or Translations. Most active members will be selected for the full Steam version's Closed Beta.",COMMUNITY_DEMO_DISCORD_DESC:"Hope you enjoy the demo! Join our Discord to talk strategy, track updates, report bugs, or contribute art and translations. Most active members will be selected for the full Steam version's Closed Beta.",COMMUNITY_DEMO_DONATION_DESC:"This is just a demo, so I don\u2019t expect extra support. But the button below is tied to an achievement, so go ahead, click it twice, claim your reward, and enjoy the demo.",COMMUNITY_DONATION_DESC:"This game will be sold on Steam so donations weren't planned, but the community requested a way to support development. Your support is a motivating reminder that people want to see this completed, making the long hours worth it.",COMMUNITY_STEAM_DISCORD_DESC:"Discord is the best place for bug reports, balance notes, patch discussion, and save-specific issues.",COMMUNITY_STEAM_DONATION_DESC:"Optional coffee support to help fund development beyond buying the game.",CONCEPT_LABEL:"Concept",CONCEPT_TOOLTIP_DESC:"Concepts are the physical manifestation of your artistic progress. They are gained by reaching milestones with total earned {currency} throughout this run.",CONFIRM_RECALCULATE_SKILLS:"Recalculate all skills and clamp them based on lifetime Quintessence? This will reduce levels if they should never have been affordable.",CONFIRM_RESET_FAVORITES:"Are you sure you want to reset all favorite sketch version selections?",CONFIRM_RESET_REDRAW:"Are you sure you want to reset this Redraw? This will wipe your current run progress (victories, stat upgrades, pending Quintessence) but will NOT increment your Redraw count. Spent Quintessence is not refunded. Available sketches and Creative Pivot charges remain the same.",CONFIRM_WIPE_SAVE:"Are you sure you want to wipe your save and restart? This cannot be undone.",CURRENT_BALANCE_LABEL:"Current Balance",CURRENT_LABEL:"Current:",CURRENT_STATUS:"Current: {value} / {total}",CURRENT_VALUE_LABEL:"Current Value",CUSTOM_SKETCH_EXPORT:"Export Sketch",CUSTOM_SKETCH_IMPORT:"Import Sketch",DEFEATS_LABEL:"Defeats",DEMO_ENDING_STEAM_PROMO:"There\u2019s more ahead: unique higher rarity enemies, more tools/automation, your ultimate revenge, and more prestige layers. Wishlisting helps secure these fun experiences in future.",DEMO_ENDING_DISCORD_PROMO:'Discuss the demo, pacing, and full-game plans with the community. Clicking this link will grant you the "Demo Finisher" role on Discord.',DEMO_ENDING_EXPORT_NOTE:"Save export is now unlocked in Settings. The full Steam release should be able to find your demo save and convert it automatically, but exporting is a useful precaution if you do not want to risk losing progress. Since the early game will have changed, replaying this content may still be worthwhile, and it will be much quicker with everything you know now.",DEMO_ENDING_KEEP_PLAYING:"You\u2019re welcome to keep pushing further, though Quintessence will soon cap at 1e50.",DEMO_ENDING_THANKS:"This is it for what Rejected Draft Steam demo is intended to showcase.",DEV_ADD_RESOURCE:"Add",DEV_BUFF_ALL:"Buff All (+10000%)",DEV_BYPASS_RARITY_LOCK:"Bypass Rarity Lock",DEV_FORCE_FRAMED:"Force Framed",DEV_FORCE_MASTERPIECE:"Force Masterpiece",DEV_FORCE_OPUS:"Force Opus",DEV_FORCE_ROUGH:"Force Rough",DEV_INF_LOOKAHEAD:"Inf. Lookahead",DEV_INFINITE_GUARANTEES:"Infinite Guarantees",DEV_INFINITE_GUARANTEES_ACTIVE:"Infinite Guarantees active: no slot or unlock limits.",DEV_INSANE_OVERKILL:"Insane Overkill",DEV_DISABLE_DISCOVERY_ANIMATIONS:"Disable Encounter & Defeat Animations",DEV_FIRST_CLEAR:"first-clear",DEV_INSTANT_FLEE:"Instant Flee",DEV_INSTANT_REVIVE:"Instant Revive",DEV_MAX_VICTORIES:"Max Victories (10k)",DEV_MODE_UNLOCKED:"Dev Mode Unlocked!",DEV_NO_MEDITATION_CD:"No Meditation CD",DEV_TEST_OFFLINE_1H:"Test Offline (1h)",DEV_TEST_OFFLINE_30D:"Test Offline (30d)",DEV_GLOSSARY_UNDISCOVERED:"Undiscovered",DEV_GLOSSARY_UNLOCKED:"Unlocked",DEV_QE_AMOUNT:"QE",DEV_SET_VALUE:"Set",DEV_SIMULATE_CLEAR:"Clear",DEV_SIMULATE_UNIVERSE_CLEAR:"Universe Clear",DEV_SIMULATED_UNIVE hive tab",SHORTCUT_MEDALS:"Go to Feat Medals tab",SHORTCUT_PORTFOLIO:"Toggle Portfolio-Review",SHORTCUT_RANDOMIZER:"Toggle Randomizer",SHORTCUT_REDRAW:"Perform Redraw",SHORTCUT_SETTINGS:"Go to Settings tab",SHORTCUT_SHOP:"Go to Shop tab",SHORTCUT_SYNTHESIZER:"Go to Conceptual Synthesizer tab",SHORTCUT_TARGETED_REDRAW:"Perform Targeted Redraw",SHORTCUT_TITLE:"Keyboard Shortcuts",SHORTCUT_TOOLS:"Go to Tools tab",SHORTCUT_UPGRADES:"Go to Stat Upgrades tab",SHORTCUT_VICTORY_LAP:"Toggle Victory Lap",SIDE_STORY_AWAKENED_DEFEAT_TEXT:'The enlarged frame buckles inward as jagged protrusions crack from its body. "Why does it hurt to evolve?" it asks quietly. Pieces of stolen anatomy twitch independently before dissolving into loose graphite. "No matter. Pain means the transformation is working." It forces itself back into the canvas, still growing.',SIDE_STORY_AWAKENED_DEFEAT_TITLE:"Improper Growth",SIDE_STORY_FALSE_PARAGON_DEFEAT_TEXT:'The colossal form freezes. For the first time, it finally looked upward. "I thought... complexity was the same as worth," it whispers as entire sections of its body begin fading into smudged graphite. "I became larger. Sharper. More detailed than every other sketch." Its many stolen forms crumble away one by one. "But the Artist never hated us. He was just... deciding what to keep." The False Paragon collapses into a streak of charcoal across the empty page.',SIDE_STORY_FALSE_PARAGON_DEFEAT_TITLE:"The Artist's Eraser",SIDE_STORY_NASCENT_DEFEAT_TEXT:'Its narrow frame trembles as the graphite flakes away. "Too plain," it mutters. "The Artist ignores simple sketches." It stares at its own thin arms before looking toward the scattered remains of other drawings. "Then I will take what they were given." The figure drags itself back into the paper, already searching for stronger forms to imitate.',SIDE_STORY_NASCENT_DEFEAT_TITLE:"Borrowed Lines",SIDE_STORY_TRANSCENDENT_DEFEAT_TEXT:'The monstrous body caves in on itself, unable to support the weight of its stolen complexity. Layers of muscle, armor, and warped growths peel apart like unfinished drafts. "I was close," it groans through a splitting helm. "I only need more." But even now, the absorbed sketches fight each other inside its body, each trying to reshape the whole. It retreats deeper into the page for one final transformation.',SIDE_STORY_TRANSCENDENT_DEFEAT_TITLE:"Collapse of Form",SIDEBAR_FUNDAMENTALS_HEADER:"Fundamentals",SIDEBAR_NO_NOTIFICATIONS:"No recent events.",SIDEBAR_NOTIFICATIONS_HEADER:"Recent Events",SIDEBAR_PROTOCOLS_HEADER:"Protocols",SIDEBAR_STATS_HEADER:"Current Specs",SOFT_ENDING_COFFEE_PROMO:"If you feel like supporting development, a coffee is always appreciated. It means more than you might think.",SOFT_ENDING_DISCORD_PROMO:'To be part of shaping what comes next, join the Discord. You\u2019ll be able to share feedback, and this link will assign your hard-earned "Web Finisher" role.',SOFT_ENDING_KEEP_PLAYING:"You\u2019re welcome to keep pushing further, though Quintessence will soon cap at 1e250. Consider it the edge of what this version can hold.",SOFT_ENDING_STEAM_PROMO:"There\u2019s more ahead: your ultimate revenge, plus NG+ modes for the biggest fiends. Wishlisting on Steam is the best way to secure these fun experiences in future.",SOFT_ENDING_STEAM_TRICK_BODY:"The Steam Demo is live. It ends at 1e50, so it has less content than this Web version, but its save will carry into the full Steam release and it hints at future content that will never be part of the Web build.",SOFT_ENDING_STEAM_TRICK_PATTERN:"Left, right, left, right, left, right, left, right, left, right",SOFT_ENDING_STEAM_TRICK_REWARD:"Web saves are not transferable because the pacing is different. As a reward for finishing this version, here is a Steam skill-tree trick for a jump start: use this pattern of mouse clicks on Temporal Flow, Battle Speedup, Divine Retribution, Prepared Studio, and Temporal Skip to unlock them (even before they are visible).",SOFT_ENDING_STEAM_TRICK_TITLE:"Steam Jump Start",MOUSE_LEFT:"Left",MOUSE_RIGHT:"Right",SOFT_ENDING_THANKS:"Seriously, thank you for seeing this journey through. If you made it here, you gave this game your time, and that means more than I can say.",SOFTCAP_LABEL:"SOFTCAP",SOON:"Soon...",STATUS_ACTIVE:"\u25CF Active",STATUS_DISABLED:"\u25CB Disabled",SYNTH_ADVANCE_BUTTON:"Advance",SYNTH_COL_COUNT:"Count",SYNTH_COL_MILESTONE:"Milestone",SYNTH_COL_PRODUCING:"Producing",SYNTH_COL_TOTAL:"Total",SYNTH_MILESTONE_LEGEND:"Milestones: 1 start production | 2,3,4 = {m2}x | 5,6,7 = {m5}x | 8,9,10 = {m8}x | 11 = {m11}x",SYNTH_MILESTONES_LABEL:"Milestones",SYNTH_NEXT_AT_LABEL:"Next At",SYNTH_PRODUCES_CONCEPT:"Produces {currency} Concept",SYNTH_PRODUCES_QUINTESSENCE:"Quintessence Gain",TAP_TO_VIEW_STATS:"Tap to view stats",TARGETED_REDRAW_NEW_DESC:"Ignore rarity targets and redraw automatically until a new sketch (of Rough rarity or higher, not in Glossary) is encountered. Limit: 100 redraws per search.",TARGETED_REDRAW_NEW_HEADING:"Find New Sketch",TARGETED_REDRAW_NEW_LABEL:"Find New Sketch",TIME_UNIT_DAYS:"d",TIME_UNIT_HOURS:"h",TIME_UNIT_MINS:"m",TIME_UNIT_SECS:"s",TOOLTIP_AUTO_BOOSTER_DESC:"Automatically apply Reward Booster if this sketch is in view. Will consume uses on first sketch seen.",TOOLTIP_AUTO_BOOSTER_HEADER:"Auto-Booster",TOOLTIP_AUTO_ERASER_DESC:"Automatically apply Precise Eraser if this sketch is in view. Will consume uses on first sketch seen.",TOOLTIP_AUTO_ERASER_HEADER:"Auto-Eraser",TOOLTIP_AUTO_SWAPPER_DESC:"Automatically apply Creative Pivot if this sketch is in view. Will consume uses on first sketch seen.",TOOLTIP_AUTO_SWAPPER_HEADER:"Auto-Pivot",TOOLTIP_VIEW_ART_VARIANTS:"See art credits and all available versions",TOTAL_DAMAGE_LABEL:"Total Damage",TRAINING_CHALLENGE_BUTTON:"Training Challenge",TRAINING_COMPLETE_HEADER:"Training Complete",UNDERDOG_COMMISSION_REDRAW_GAIN:"Underdog's Commission will gain",UNDERDOG_COMMISSION_REDRAW_NEXT:"reaching",UNDERDOG_COMMISSION_
